<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Registro al evento</title>
  </head>
  <body class="bg-light">
    <main class="container mt-5">
      <div class="card mx-auto shadow w-50">
        <div class="card-body">
          <h1 class="h3 text-center mb-4">Registro al evento</h1>

          <form id="formulario">
            <div class="mb-3">
              <label for="nombre" class="form-label">Nombre</label>
              <input
                type="text"
                id="nombre"
                name="nombre"
                class="form-control"
                required
              />
            </div>

            <div class="mb-3">
              <label for="edad" class="form-label">Edad</label>
              <input
                type="number"
                id="edad"
                name="edad"
                min="1"
                class="form-control"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary w-100">Enviar</button>
          </form>

          <p
            id="mensaje"
            class="mt-3 text-center fw-bold"
            aria-live="polite"
          ></p>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
